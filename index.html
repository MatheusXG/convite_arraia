<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>3º Arraiá da Vila do Chaves</title>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Luckiest+Guy&family=Nunito:wght@700;800;900&display=swap');

    :root{
      --bg-1:#120401;
      --bg-2:#2a0e04;
      --bg-3:#5f280d;
      --gold-1:#ffd66a;
      --gold-2:#f3a022;
      --cream:#fff3cb;
      --cream-2:#ffe6a8;
      --green-1:#25d366;
      --green-2:#128c48;
      --blue-1:#52b6dd;
      --blue-2:#1f81ab;
      --brown:#351100;
      --shadow:rgba(0,0,0,.35);
    }

    *{margin:0;padding:0;box-sizing:border-box}

    html,body{
      width:100%;
      height:100%;
      overflow:hidden;
      background:#0a0200;
      font-family:'Nunito',system-ui,-apple-system,sans-serif;
    }

    body{
      display:grid;
      place-items:center;
    }

    .invite{
      position:relative;
      width:min(100vw,430px);
      height:100dvh;
      min-height:680px;
      max-height:950px;
      overflow:hidden;
      isolation:isolate;
      background:var(--bg-1);
      box-shadow:0 0 44px rgba(0,0,0,.5);
    }

    /* fundo usando a própria imagem enviada */
    .invite::before{
      content:"";
      position:absolute;
      inset:-30px;
      z-index:0;
      background:
        linear-gradient(180deg, rgba(18,4,1,.04), rgba(18,4,1,.92)),
        url("./assets/convite_festa_junina.png") center top / cover no-repeat;
      filter:blur(22px) brightness(.52) saturate(1.12);
      transform:scale(1.08);
      opacity:.98;
    }

    .invite::after{
      content:"";
      position:absolute;
      inset:0;
      z-index:1;
      background:
        radial-gradient(circle at 50% 16%, rgba(255,214,106,.20), transparent 35%),
        radial-gradient(circle at 22% 76%, rgba(243,160,34,.18), transparent 26%),
        linear-gradient(180deg, rgba(0,0,0,0) 0%, rgba(0,0,0,.06) 46%, rgba(0,0,0,.58) 67%, rgba(0,0,0,.9) 100%);
      pointer-events:none;
    }

    .hero{
      position:absolute;
      inset:0 0 auto 0;
      height:69%;
      z-index:2;
      display:flex;
      align-items:flex-start;
      justify-content:center;
      pointer-events:none;
    }

    .hero img{
      width:100%;
      height:auto;
      display:block;
      filter:drop-shadow(0 18px 28px rgba(0,0,0,.44)) saturate(1.03) contrast(1.02);
      -webkit-mask-image:linear-gradient(to bottom, #000 0%, #000 75%, rgba(0,0,0,.92) 84%, rgba(0,0,0,.4) 93%, transparent 100%);
      mask-image:linear-gradient(to bottom, #000 0%, #000 75%, rgba(0,0,0,.92) 84%, rgba(0,0,0,.4) 93%, transparent 100%);
    }

    /* data mais visível, encaixada na arte */

    .fusion{
      position:absolute;
      left:-12%;
      right:-12%;
      top:50.5%;
      height:28%;
      z-index:3;
      background:
        radial-gradient(ellipse at center,
          rgba(255,170,49,.34) 0%,
          rgba(103,36,8,.44) 36%,
          rgba(20,5,1,.94) 76%,
          rgba(20,5,1,0) 100%);
      filter:blur(10px);
      pointer-events:none;
    }

    .content{
      position:absolute;
      left:0;
      right:0;
      bottom:0;
      z-index:5;
      padding:0 clamp(12px,3.6vw,18px) max(12px, env(safe-area-inset-bottom));
    }

    .panel{
      position:relative;
      overflow:hidden;
      padding:16px;
      border-radius:30px 30px 0 0;
      background:
        linear-gradient(180deg,
          rgba(96,36,8,.70) 0%,
          rgba(43,14,3,.94) 42%,
          rgba(18,5,1,.985) 100%);
      border:1px solid rgba(255,215,104,.22);
      border-bottom:0;
      box-shadow:0 -20px 36px rgba(0,0,0,.22), inset 0 1px 0 rgba(255,255,255,.12);
      backdrop-filter:blur(10px);
    }

    .panel::after{
      content:"";
      position:absolute;
      left:24px;
      right:24px;
      top:0;
      height:3px;
      border-radius:999px;
      background:linear-gradient(90deg, transparent, var(--gold-1), var(--gold-2), transparent);
      box-shadow:0 0 16px rgba(243,160,34,.55);
    }

    .panel-title{
      position:relative;
      z-index:1;
      text-align:center;
      margin-bottom:12px;
    }

    .panel-title strong{
      display:block;
      color:var(--cream);
      font-family:'Luckiest Guy', cursive;
      font-size:clamp(19px,5.1vw,24px);
      line-height:1;
      letter-spacing:.5px;
      text-shadow:0 3px 10px rgba(0,0,0,.28);
    }

    .panel-title span{
      display:block;
      margin-top:5px;
      color:rgba(255,230,169,.84);
      font-size:clamp(10px,2.5vw,12px);
      font-weight:900;
      letter-spacing:.14em;
      text-transform:uppercase;
    }

    .details{
      position:relative;
      z-index:1;
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:9px;
    }

    .detail{
      min-height:84px;
      padding:11px;
      border-radius:20px;
      background:linear-gradient(180deg, rgba(255,243,203,.98), rgba(255,222,149,.95));
      border:1px solid rgba(255,255,255,.46);
      box-shadow:0 10px 22px rgba(0,0,0,.22), inset 0 1px 0 rgba(255,255,255,.72);
      position:relative;
      overflow:hidden;
      transform:translateY(10px);
      opacity:0;
      animation:enter .45s ease forwards;
    }

    .detail:nth-child(1){animation-delay:.05s}
    .detail:nth-child(2){animation-delay:.12s}
    .detail:nth-child(3){animation-delay:.19s}
    .detail:nth-child(4){animation-delay:.26s}

    @keyframes enter{
      to{transform:translateY(0);opacity:1}
    }

    .detail::before{
      content:"";
      position:absolute;
      right:-16px;
      top:-16px;
      width:60px;
      height:60px;
      border-radius:50%;
      background:currentColor;
      opacity:.10;
    }

    .detail-icon{
      width:38px;
      height:38px;
      border-radius:14px;
      display:grid;
      place-items:center;
      color:#fff;
      font-size:21px;
      box-shadow:inset 0 1px 0 rgba(255,255,255,.24), 0 6px 14px rgba(0,0,0,.18);
    }

    .detail h2{
      margin-top:8px;
      color:var(--brown);
      font-size:14px;
      line-height:1.05;
      font-weight:900;
    }

    .detail p{
      margin-top:3px;
      color:rgba(52,17,0,.72);
      font-size:11px;
      line-height:1.08;
      font-weight:900;
    }

    .food{color:#ad5710}
    .money{color:#199754}
    .kids{color:#1f81ab}
    .rule{color:#c83c18}

    .food .detail-icon{background:linear-gradient(135deg,#c86d16,#783106)}
    .money .detail-icon{background:linear-gradient(135deg,#25b55d,#116c39)}
    .kids .detail-icon{background:linear-gradient(135deg,#2f95c5,#0d5478)}
    .rule .detail-icon{background:linear-gradient(135deg,#e24b21,#8f230d)}

    .cta{
      position:relative;
      z-index:1;
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:10px;
      margin-top:12px;
    }

    .btn{
      min-height:52px;
      border:0;
      border-radius:19px;
      padding:10px 12px;
      cursor:pointer;
      -webkit-tap-highlight-color:transparent;
      display:flex;
      align-items:center;
      justify-content:center;
      gap:9px;
      font-family:'Nunito', sans-serif;
      font-size:13px;
      font-weight:900;
      line-height:1.05;
      box-shadow:0 12px 22px rgba(0,0,0,.24), inset 0 1px 0 rgba(255,255,255,.22);
      transition:transform .15s ease, filter .15s ease;
    }

    .btn:active{
      transform:scale(.97);
      filter:brightness(.95);
    }

    .btn-icon{
      width:24px;
      height:24px;
      flex:0 0 auto;
      display:block;
    }

    .btn-wa{
      color:#fff;
      background:linear-gradient(135deg, var(--green-1), var(--green-2));
      animation:waGlow 2.4s ease-in-out infinite;
    }

    @keyframes waGlow{
      0%,100%{box-shadow:0 12px 22px rgba(0,0,0,.24), 0 0 0 rgba(37,211,102,0)}
      50%{box-shadow:0 12px 22px rgba(0,0,0,.24), 0 0 24px rgba(37,211,102,.45)}
    }

    .btn-map{
      color:#fff;
      background:linear-gradient(135deg, var(--blue-1), var(--blue-2));
    }

    .note{
      position:relative;
      z-index:1;
      margin-top:10px;
      text-align:center;
      color:rgba(255,230,169,.78);
      font-size:11px;
      font-weight:900;
    }

    /* fogueira + partículas */
    .bonfire{
      position:absolute;
      left:50%;
      bottom:132px;
      transform:translateX(-50%);
      z-index:4;
      width:72px;
      height:88px;
      pointer-events:none;
      opacity:.98;
    }

    .log{
      position:absolute;
      bottom:0;
      width:42px;
      height:10px;
      background:linear-gradient(180deg,#6d3b14,#4c240b);
      border-radius:10px;
      box-shadow:0 2px 0 rgba(255,255,255,.06) inset;
    }

    .log.left{left:8px; transform:rotate(22deg)}
    .log.right{right:8px; transform:rotate(-22deg)}

    .flame-outer, .flame-inner{
      position:absolute;
      left:50%;
      transform:translateX(-50%);
      border-radius:50% 50% 50% 50% / 62% 62% 38% 38%;
      animation:flicker 1.4s ease-in-out infinite;
      filter:blur(.2px);
    }

    .flame-outer{
      bottom:12px;
      width:34px;
      height:48px;
      background:radial-gradient(circle at 50% 70%, #fff6bf 0%, #ffd56f 26%, #ff9d1d 58%, #ff5f00 100%);
      box-shadow:0 0 26px rgba(255,136,26,.7);
    }

    .flame-inner{
      bottom:18px;
      width:18px;
      height:28px;
      background:radial-gradient(circle at 50% 70%, #fffde6 0%, #ffe9a1 34%, #ffc241 70%, #ff8a00 100%);
      animation-duration:1s;
    }

    @keyframes flicker{
      0%,100%{transform:translateX(-50%) scale(1) rotate(-2deg)}
      25%{transform:translateX(-50%) scale(1.05,.96) rotate(2deg)}
      50%{transform:translateX(-50%) scale(.96,1.08) rotate(-1deg)}
      75%{transform:translateX(-50%) scale(1.04,.98) rotate(1deg)}
    }

    #embers{
      position:absolute;
      inset:0;
      z-index:4;
      pointer-events:none;
    }

    .ember{
      position:absolute;
      bottom:145px;
      left:50%;
      border-radius:50%;
      opacity:0;
      animation:rise linear infinite;
      box-shadow:0 0 8px currentColor;
    }

    @keyframes rise{
      0%{opacity:0; transform:translate(-50%, 0) scale(.4)}
      15%{opacity:1}
      100%{opacity:0; transform:translate(calc(-50% + var(--drift)), -180px) scale(1.1)}
    }

    @media (max-height:740px){
      .hero{height:61.5%}
      .panel{padding:13px}
      .details{gap:8px}
      .detail{min-height:74px;padding:10px}
      .detail p{display:none}
      .note{display:none}
      .bonfire{bottom:116px; transform:translateX(-50%) scale(.88)}
      .ember{bottom:128px}
    }

    @media (max-height:675px){
      .panel-title span{display:none}
      .detail{min-height:68px}
      .detail-icon{width:34px;height:34px;font-size:19px}
      .bonfire{display:none}
    }

    @media (min-width:431px){
      .invite{
        border-radius:28px;
        height:min(100dvh,950px);
      }
      .panel{
        border-radius:30px;
        border-bottom:1px solid rgba(255,215,104,.14);
      }
    }

    @media (prefers-reduced-motion: reduce){
      *, *::before, *::after{
        animation:none !important;
        transition:none !important;
      }
    }
  </style>
</head>
<body>
  <main class="invite" aria-label="Convite do 3º Arraiá da Vila do Chaves">
    <div class="hero">
      <img src="./assets/convite_festa_junina.png" alt="3º Arraiá da Vila do Chaves" />
    </div>
<div class="fusion"></div>

    <div id="embers"></div>

    <div class="bonfire" aria-hidden="true">
      <div class="flame-outer"></div>
      <div class="flame-inner"></div>
      <div class="log left"></div>
      <div class="log right"></div>
    </div>

    <section class="content">
      <div class="panel">
        <div class="panel-title">
          <strong>Informações do arraiá</strong>
          <span>confira os detalhes</span>
        </div>

        <div class="date-banner" aria-label="Data e horário do evento">
          <div class="date-banner-main">27/06 • 20h</div>
          <div class="date-banner-sub">Reserve essa data</div>
        </div>

        <div class="details">
          <article class="detail food">
            <div class="detail-icon">🍲</div>
            <h2>Prato típico</h2>
            <p>Levar uma comida junina</p>
          </article>

          <article class="detail money">
            <div class="detail-icon">💵</div>
            <h2>R$ 20</h2>
            <p>Valor por pessoa</p>
          </article>

          <article class="detail kids">
            <div class="detail-icon">👦</div>
            <h2>Criança não paga</h2>
            <p>Até 13 anos</p>
          </article>

          <article class="detail rule">
            <div class="detail-icon">🚫</div>
            <h2>Convidado não convida</h2>
            <p>Organização da festa</p>
          </article>
        </div>

        <div class="cta">
          <button class="btn btn-wa" type="button" onclick="openWhatsApp()" aria-label="Confirmar presença pelo WhatsApp">
            <svg class="btn-icon" viewBox="0 0 32 32" aria-hidden="true" fill="none">
              <circle cx="16" cy="16" r="15" fill="rgba(255,255,255,.18)"/>
              <path fill="#fff" d="M16.02 6.2c-5.28 0-9.55 4.2-9.55 9.38 0 1.67.45 3.31 1.3 4.76l-1.38 5.04 5.19-1.35a9.67 9.67 0 0 0 4.44 1.08c5.28 0 9.55-4.2 9.55-9.39 0-5.18-4.27-9.52-9.55-9.52Zm0 17.3a8.08 8.08 0 0 1-4.1-1.1l-.29-.17-3.08.8.82-2.98-.19-.3a7.76 7.76 0 0 1-1.2-4.17c0-4.28 3.56-7.78 8.03-7.78 4.43.04 8 3.52 8 7.92 0 4.28-3.6 7.78-7.99 7.78Zm4.4-5.88c-.24-.12-1.42-.7-1.64-.78-.22-.08-.38-.12-.54.12-.16.24-.62.78-.76.94-.14.16-.28.18-.52.06a6.58 6.58 0 0 1-1.94-1.19 7.22 7.22 0 0 1-1.34-1.67c-.14-.24-.01-.37.11-.49.11-.11.24-.28.36-.42.12-.14.16-.24.24-.4.08-.16.04-.3-.02-.42-.06-.12-.54-1.28-.74-1.75-.2-.47-.4-.41-.54-.41h-.46c-.16 0-.42.06-.64.3-.22.24-.84.82-.84 2s.86 2.31.98 2.47c.12.16 1.68 2.66 4.15 3.62.59.25 1.05.4 1.41.51.59.19 1.12.16 1.55.1.47-.07 1.42-.58 1.62-1.13.2-.55.2-1.02.14-1.12-.06-.1-.22-.16-.46-.28Z"/>
            </svg>
            Confirmar presença
          </button>

          <button class="btn btn-map" type="button" onclick="openLocation()" aria-label="Ver localização da festa">
            <svg class="btn-icon" viewBox="0 0 32 32" aria-hidden="true" fill="none">
              <path fill="#fff" d="M16 3c-4.63 0-8.38 3.75-8.38 8.38 0 6 7.14 14.41 7.44 14.76a1.23 1.23 0 0 0 1.88 0c.3-.35 7.44-8.77 7.44-14.76C24.38 6.75 20.63 3 16 3Zm0 11.56a3.18 3.18 0 1 1 0-6.36 3.18 3.18 0 0 1 0 6.36Z"/>
            </svg>
            Ver localização
          </button>
        </div>

        <div class="note">Vila do Chaves • 27/06 às 20h</div>
      </div>
    </section>
  </main>

  <script>
    const MAPS_URL = 'https://www.google.com/maps/search/?api=1&query=Vila+do+Chaves';
    const embersEl = document.getElementById('embers');
    const colors = ['#ffd56f', '#ffb347', '#ff8a00', '#ff6a00'];

    function createEmber() {
      const el = document.createElement('span');
      el.className = 'ember';
      const size = 2 + Math.random() * 5;
      const left = 42 + Math.random() * 16;
      const drift = (-40 + Math.random() * 80) + 'px';
      const duration = 1.8 + Math.random() * 2.4;
      const delay = Math.random() * 2;
      const color = colors[Math.floor(Math.random() * colors.length)];

      el.style.width = size + 'px';
      el.style.height = size + 'px';
      el.style.left = left + '%';
      el.style.setProperty('--drift', drift);
      el.style.animationDuration = duration + 's';
      el.style.animationDelay = delay + 's';
      el.style.color = color;
      el.style.background = color;

      embersEl.appendChild(el);
    }

    for (let i = 0; i < 18; i++) createEmber();

    function openWhatsApp() {
      const text = 'Olá! Quero confirmar minha presença no 3º Arraiá da Vila do Chaves!';
      window.open('https://wa.me/?text=' + encodeURIComponent(text), '_blank');
    }

    function openLocation() {
      window.open(MAPS_URL, '_blank');
    }
  </script>
</body>
</html>
